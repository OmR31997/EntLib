name: Deploy Application

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.19.1'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci --engine-strict=false

      # Step 4: Set environment variables and replace placeholders
      - name: Set environment variables and replace placeholders
        run: |
          API_KEY="${{ secrets.FIREBASE_API_KEY }}"
          AUTH_DOMAIN="${{ secrets.FIREBASE_AUTH_DOMAIN }}"
          DATABASE_URL="${{ secrets.FIREBASE_DATABASE_URL }}"
          PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"
          STORAGE_BUCKET="${{ secrets.FIREBASE_STORAGE_BUCKET }}"
          MESSAGING_SENDER_ID="${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"
          APP_ID="${{ secrets.FIREBASE_APP_ID }}"
          MEASUREMENT_ID="${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          MOVIE_URL="${{ secrets.MOVIE_API_URL }}"
          SHOW_URL="${{ secrets.SHOW_API_URL }}"
          FEED_URL="${{ secrets.FEED_API_URL }}"
          USER_URL="${{ secrets.USER_API_URL }}"

          echo "Printing variable contents (obfuscated for security)"
          echo "API_KEY: ${API_KEY::4}****"
          echo "AUTH_DOMAIN: ${AUTH_DOMAIN::4}****"
          echo "DATABASE_URL: ${DATABASE_URL::4}****"
          echo "PROJECT_ID: ${PROJECT_ID::4}****"
          echo "STORAGE_BUCKET: ${STORAGE_BUCKET::4}****"
          echo "MESSAGING_SENDER_ID: ${MESSAGING_SENDER_ID::4}****"
          echo "APP_ID: ${APP_ID::4}****"
          echo "MEASUREMENT_ID: ${MEASUREMENT_ID::4}****"
          echo "MOVIE_URL: ${MOVIE_URL::4}****"
          echo "SHOW_URL: ${SHOW_URL::4}****"
          echo "FEED_URL: ${FEED_URL::4}****"
          echo "USER_URL: ${USER_URL::4}****"

          echo "View config.json before replacements"
          cat src/assets/config.json

          sed -i 's|__API_KEY__|'"$API_KEY"'|g' src/assets/config.json
          sed -i 's|__AUTH_DOMAIN__|'"$AUTH_DOMAIN"'|g' src/assets/config.json
          sed -i 's|__DATABASE_URL__|'"$DATABASE_URL"'|g' src/assets/config.json
          sed -i 's|__PROJECT_ID__|'"$PROJECT_ID"'|g' src/assets/config.json
          sed -i 's|__STORAGE_BUCKET__|'"$STORAGE_BUCKET"'|g' src/assets/config.json
          sed -i 's|__MSG_SENDER_ID__|'"$MESSAGING_SENDER_ID"'|g' src/assets/config.json
          sed -i 's|__APP_ID__|'"$APP_ID"'|g' src/assets/config.json
          sed -i 's|__MEASUREMENT_ID__|'"$MEASUREMENT_ID"'|g' src/assets/config.json
          sed -i 's|__MOVIE_URL__|'"$MOVIE_URL"'|g' src/assets/config.json
          sed -i 's|__SHOW_URL__|'"$SHOW_URL"'|g' src/assets/config.json
          sed -i 's|__FEED_URL__|'"$FEED_URL"'|g' src/assets/config.json
          sed -i 's|__USER_URL__|'"$USER_URL"'|g' src/assets/config.json

      # Step 5: Verify Placeholder Replacement
      - name: Verify Placeholder Replacement
        run: |
          echo "Contents of config.json after replacements"
          cat src/assets/config.json
          grep -E '__[A-Z_]+__' src/assets/config.json && exit 1 || echo "All placeholders have been replaced successfully."

      # Step 6: Build the Angular application
      - name: Build Angular App
        run: npm run build -- --configuration production --output-path=docs --base-href /EntLib/

      # Step 7: Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs/

      # Step 8: Clean workspace
      - name: Clean workspace
        run: |
          rm -rf node_modules/
          npm cache clean --force

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages

    steps:
      # Step 9: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 10: Install Firebase dependencies
      - name: Install Firebase Packages
        run: npm install firebase @angular/fire

      # Step 11: Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Step 12: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project entertaimentlib-ad956

      # Step 13: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
