name: Deploy Application

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Replace Placeholders in config.json
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          MOVIE_API_URL: ${{ secrets.MOVIE_API_URL }}
          SHOW_API_URL: ${{ secrets.SHOW_API_URL }}
          FEED_API_URL: ${{ secrets.FEED_API_URL }}
          USER_API_URL: ${{ secrets.USER_API_URL }}
        run: |
          sed -i "s|__API_KEY__|$FIREBASE_API_KEY|g" src/assets/config.json


      - name: Build Angular App
        run: npm run build -- --configuration production --output-path=docs --base-href /EntLib/

      - name: Copy config.json to build folder
        run: |
          mkdir -p docs/assets
          cp src/assets/config.json docs/assets/config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages  # Required for GitHub Pages deployment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 1: Set up Node.js (for npm)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.19.0'

      # Step 2: Install Firebase CLI (this was missing)
      - name: Install Firebase CLI
        run: |
          npm install -g firebase-tools
          firebase --version # Confirm firebase CLI is installed

      # Step 3: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}  # Set environment variable securely
        run: |
          firebase deploy --only hosting --project entertaimentlib-ad956

      # Step 4: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
