name: Deploy Application

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.19.1'

      - name: Install dependencies
        run: npm ci --engine-strict=false

      - name: Verify config.json File Exists
        run: |
          if [ ! -f src/assets/config.json ]; then 
            echo "src/assets/config.json NOT FOUND"
            exit 1
          else 
            echo "src/assets/config.json exists"
            cat src/assets/config.json
          fi

      - name: Set environment variables and replace placeholders
        run: |
          API_KEY="${{ secrets.FIREBASE_API_KEY }}"
          sed -i 's|__API_KEY__|'"$API_KEY"'|g' src/assets/config.json

      - name: Debug sed replacement
        run: |
          echo "sed -i 's|__API_KEY__|$API_KEY|g' src/assets/config.json"

      - name: Check if placeholders are replaced
        run: |
          cat src/assets/config.json
          grep -E '__[A-Z_]+__' src/assets/config.json && exit 1 || echo "All placeholders replaced successfully."

      - name: Build Angular App
        run: npm run build -- --configuration production --output-path=docs --base-href /EntLib/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Firebase Packages
        run: npm install firebase @angular/fire

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project entertaimentlib-ad956

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
