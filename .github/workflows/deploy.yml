name: Deploy Application

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.19.0'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Replace Placeholders in config.json
      - name: Replace Placeholders in config.json
        run: |
          sed -i "s|__API_KEY__|${{ secrets.FIREBASE_API_KEY }}|g" src/assets/config.json
          sed -i "s|__AUTH_DOMAIN__|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" src/assets/config.json
          sed -i "s|__DATABASE_URL__|${{ secrets.FIREBASE_DATABASE_URL }}|g" src/assets/config.json
          sed -i "s|__PROJECT_ID__|${{ secrets.FIREBASE_PROJECT_ID }}|g" src/assets/config.json
          sed -i "s|__STORAGE_BUCKET__|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" src/assets/config.json
          sed -i "s|__MSG_SENDER_ID__|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" src/assets/config.json
          sed -i "s|__APP_ID__|${{ secrets.FIREBASE_APP_ID }}|g" src/assets/config.json
          sed -i "s|__MEASUREMENT_ID__|${{ secrets.FIREBASE_MEASUREMENT_ID }}|g" src/assets/config.json
          sed -i "s|__MOVIE_URL__|${{ secrets.MOVIE_API_URL }}|g" src/assets/config.json
          sed -i "s|__SHOW_URL__|${{ secrets.SHOW_API_URL }}|g" src/assets/config.json
          sed -i "s|__FEED_URL__|${{ secrets.FEED_API_URL }}|g" src/assets/config.json
          sed -i "s|__USER_URL__|${{ secrets.USER_API_URL }}|g" src/assets/config.json

      # Step 4.1: Verify config.json replacements
      - name: Verify config.json
        run: |
          echo "Verifying placeholder replacements in config.json"
          cat src/assets/config.json
          grep -E '__[A-Z_]+__' src/assets/config.json && exit 1 || echo "All placeholders have been replaced successfully."

      # Step 5: Build the Angular application
      - name: Build Angular App
        run: npm run build -- --configuration production --output-path=docs --base-href /EntLib/

      # Step 6: Copy config.json to build output
      - name: Copy config.json to build folder
        run: cp src/assets/config.json docs/assets/config.json

      # Step 7: Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Step 3: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }} 
        run: firebase deploy --only hosting --project entertaimentlib-ad956

      # Step 4: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
