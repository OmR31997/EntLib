name: Deploy Application

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.19.1' # Updated to satisfy dependency requirements

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci --engine-strict=false

      # Step 4: Replace Placeholders in config.json
      - name: Replace Placeholders in config.json
        run: |
          sed -i "s|__API_KEY__|${{ vars.FIREBASE_API_KEY }}|g" src/assets/config.json
          sed -i "s|__AUTH_DOMAIN__|${{ vars.FIREBASE_AUTH_DOMAIN }}|g" src/assets/config.json
          sed -i "s|__DATABASE_URL__|${{ vars.FIREBASE_DATABASE_URL }}|g" src/assets/config.json
          sed -i "s|__PROJECT_ID__|${{ vars.FIREBASE_PROJECT_ID }}|g" src/assets/config.json
          sed -i "s|__STORAGE_BUCKET__|${{ vars.FIREBASE_STORAGE_BUCKET }}|g" src/assets/config.json
          sed -i "s|__MSG_SENDER_ID__|${{ vars.FIREBASE_MESSAGING_SENDER_ID }}|g" src/assets/config.json
          sed -i "s|__APP_ID__|${{ vars.FIREBASE_APP_ID }}|g" src/assets/config.json
          sed -i "s|__MEASUREMENT_ID__|${{ vars.FIREBASE_MEASUREMENT_ID }}|g" src/assets/config.json
          sed -i "s|__MOVIE_URL__|${{ secrets.MOVIE_API_URL }}|g" src/assets/config.json
          sed -i "s|__SHOW_URL__|${{ secrets.SHOW_API_URL }}|g" src/assets/config.json
          sed -i "s|__FEED_URL__|${{ secrets.FEED_API_URL }}|g" src/assets/config.json
          sed -i "s|__USER_URL__|${{ secrets.USER_API_URL }}|g" src/assets/config.json


      # Step 5: Verify Placeholder Replacement
      - name: Verify config.json
        run: |
          echo "Validating config.json replacement"
          grep -E '__[A-Z_]+__' src/assets/config.json && exit 1 || echo "All placeholders replaced."

      # Step 6: Build the Angular application
      - name: Build Angular App
        run: npm run build -- --configuration production --output-path=docs --base-href /EntLib/

      # Step 7: Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs/

      # Step 8: Clean workspace
      - name: Clean workspace
        run: |
          rm -rf node_modules/
          npm cache clean --force

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages  # Required for GitHub Pages deployment

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install Firebase CLI
      - name: Install Firebase Install 
        run: npm install firebase @angular/fire

      # Step 2: Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Step 3: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project entertaimentlib-ad956

      # Step 4: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
